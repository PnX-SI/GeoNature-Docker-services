services:
  base-backend:
    image: ${GEONATURE_BACKEND_IMAGE}-wheels
    build:
      context: sources/GeoNature
      dockerfile: backend/Dockerfile
      target: wheels
    entrypoint: /bin/true

  base-frontend-source:
    image: ${GEONATURE_FRONTEND_IMAGE}-source
    build:
      context: sources/GeoNature
      dockerfile: frontend/Dockerfile
      target: source
    entrypoint: /bin/true

  base-frontend-nginx:
    image: ${GEONATURE_FRONTEND_IMAGE}-nginx
    build:
      context: sources/GeoNature
      dockerfile: frontend/Dockerfile
      target: prod-base
    entrypoint: /bin/true

  usershub:
    build:
      target: prod
      context: sources/UsersHub

  geonature-backend:
    build:
      context: .
      dockerfile: build/Dockerfile-geonature-backend
      target: prod-extra
      args:
          GEONATURE_BACKEND_IMAGE: ${GEONATURE_BACKEND_IMAGE}
    # So docker compose know that it is normal that base backend stop running and exit
    depends_on:
      base-backend:
        condition: service_completed_successfully

  geonature-frontend:
      build:
        context: .
        dockerfile: build/Dockerfile-geonature-frontend
        target: prod-extra
        args:
          GEONATURE_FRONTEND_IMAGE: ${GEONATURE_FRONTEND_IMAGE}
      # So docker compose know that it is normal that base frontend stop running and exit
      depends_on:
        base-frontend-source:
          condition: service_completed_successfully
        base-frontend-nginx:
          condition: service_completed_successfully